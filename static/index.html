<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #e94560;
    }

    #mode-selector {
      margin-bottom: 1rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    #mode-selector label {
      cursor: pointer;
      font-size: 0.95rem;
    }

    #mode-selector label.disabled-label {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      min-height: 1.6rem;
    }

    #turn-display {
      font-weight: bold;
    }

    .error {
      color: #ff4444;
      font-size: 0.95rem;
      min-height: 1.2rem;
      margin-bottom: 0.3rem;
    }

    #outcome-message {
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 1.8rem;
      margin-bottom: 0.5rem;
    }

    #outcome-message.win { color: #4caf50; }
    #outcome-message.draw { color: #9e9e9e; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 312px;
      margin: 1rem auto;
      background: #16213e;
      padding: 4px;
      border-radius: 8px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #0f3460;
      border: none;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover { background: #1a4a7a; transform: scale(1.03); }
    .cell.disabled { cursor: not-allowed; opacity: 0.7; }
    .cell.disabled:hover { transform: none; background: #0f3460; }
    .cell.player-X { color: #2196F3; }
    .cell.player-O { color: #F44336; }
    .cell.winning { background: #1b5e20; animation: pulse 0.6s ease-in-out 2; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    #new-game-btn {
      margin-top: 1.2rem;
      padding: 0.7rem 2rem;
      font-size: 1.1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #new-game-btn:hover { background: #c81e45; }
  </style>
</head>
<body>
  <div id="app">
    <h1 id="app-title">Tic-Tac-Toe</h1>

    <div id="mode-selector">
      <label>
        <input type="radio" name="mode" value="two-player" checked> Two Player
      </label>
      <label class="disabled-label">
        <input type="radio" name="mode" value="vs-computer" disabled> vs Computer (coming soon)
      </label>
    </div>

    <div id="status">Current turn: <span id="turn-display">X</span></div>
    <div id="error-message" class="error" style="display:none;"></div>
    <div id="outcome-message" style="display:none;"></div>

    <div id="board"></div>

    <button id="new-game-btn">New Game</button>
  </div>

  <script>
    let gameId = null;
    let gameState = null;

    async function apiCall(url, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json();
      if (!res.ok) throw data;
      return data;
    }

    async function createGame() {
      try {
        gameState = await apiCall('/games', 'POST');
        gameId = gameState.id;
        clearMessages();
        renderBoard();
      } catch (err) {
        showError(err.detail || 'Failed to create game');
      }
    }

    async function makeMove(position) {
      if (!gameState || gameState.status !== 'in_progress') return;

      try {
        gameState = await apiCall(
          `/games/${gameId}/moves`,
          'POST',
          { position: position, player: gameState.current_player }
        );
        clearError();
        renderBoard();
      } catch (err) {
        showError(err.detail || 'Invalid move');
      }
    }

    async function resetGame() {
      try {
        gameState = await apiCall(`/games/${gameId}/reset`, 'POST');
        clearMessages();
        renderBoard();
      } catch (err) {
        await createGame();
      }
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.setAttribute('data-index', i);

        const value = gameState.board[i];
        cell.textContent = value;

        if (value === 'X') cell.classList.add('player-X');
        if (value === 'O') cell.classList.add('player-O');

        if (gameState.winning_line && gameState.winning_line.includes(i)) {
          cell.classList.add('winning');
        }

        if (gameState.status !== 'in_progress') {
          cell.classList.add('disabled');
        }

        cell.addEventListener('click', () => makeMove(i));
        board.appendChild(cell);
      }

      const turnDisplay = document.getElementById('turn-display');
      turnDisplay.textContent = gameState.current_player;

      const outcome = document.getElementById('outcome-message');
      if (gameState.status === 'x_wins') {
        outcome.textContent = 'X wins!';
        outcome.className = 'win';
        outcome.style.display = 'block';
      } else if (gameState.status === 'o_wins') {
        outcome.textContent = 'O wins!';
        outcome.className = 'win';
        outcome.style.display = 'block';
      } else if (gameState.status === 'draw') {
        outcome.textContent = "It's a draw!";
        outcome.className = 'draw';
        outcome.style.display = 'block';
      } else {
        outcome.style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function clearError() {
      const el = document.getElementById('error-message');
      el.textContent = '';
      el.style.display = 'none';
    }

    function clearMessages() {
      clearError();
      const outcome = document.getElementById('outcome-message');
      outcome.textContent = '';
      outcome.style.display = 'none';
    }

    document.getElementById('new-game-btn').addEventListener('click', resetGame);
    createGame();
  </script>
</body>
</html>
